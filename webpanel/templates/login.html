<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Psiphon Panel — Đăng nhập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0806; --panel:#151009; --panel-2:#1c1509;
    --border:#332612; --text:#f2e9da; --dim:#8a7a64;
    --amber:#ffb000; --amber-dim:#8f6206; --red:#ff5c5c;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      repeating-linear-gradient(0deg, rgba(255,176,0,0.025) 0px, rgba(255,176,0,0.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at 50% -10%, #1a1206 0%, var(--void) 60%);
    color:var(--text); font-family:'IBM Plex Sans',sans-serif;
  }
  .card{
    width:340px; background:var(--panel); border:1px solid var(--border);
    padding:36px 32px; position:relative;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.22em;
    color:var(--amber-dim); text-transform:uppercase; margin:0 0 6px;
  }
  h1{
    font-family:'IBM Plex Mono',monospace; font-size:20px; margin:0 0 28px; font-weight:600;
    color:var(--amber); text-shadow:0 0 18px rgba(255,176,0,.35);
  }
  label{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--dim); display:block; margin-bottom:8px;}
  input[type=password]{
    width:100%; background:var(--void); border:1px solid var(--border); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:14px; padding:11px 12px; margin-bottom:20px;
  }
  input[type=password]:focus{outline:none; border-color:var(--amber);}
  button{
    width:100%; background:var(--amber); color:#1a1206; border:none; font-weight:600;
    font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:.05em;
    padding:12px; cursor:pointer; text-transform:uppercase;
  }
  button:hover{background:#ffc233;}
  .err{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--red);
    margin:0 0 16px; padding:8px 10px; border:1px solid rgba(255,92,92,.4); background:rgba(255,92,92,.08);
  }
  .cursor{display:inline-block; width:8px; height:14px; background:var(--amber); margin-left:6px; animation:blink 1s step-end infinite; vertical-align:middle;}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">psiphon panel · ops console</p>
    <h1>ĐĂNG NHẬP<span class="cursor"></span></h1>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <form method="post">
      <label for="password">MẬT KHẨU</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Vào Dashboard →</button>
    </form>
  </div>
</body>
</html>
